name: ci.android

on: [push, pull_request, workflow_dispatch]

jobs:

  android:

    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]

    name: ${{ matrix.abi }}
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build -G "Ninja Multi-Config" \
            --toolchain "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21

      - name: Build
        run: cmake --build build --config Release

      - name: Install emulator image (x86_64 only)
        if: matrix.abi == 'x86_64'
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses
          yes | sdkmanager --install \
            "emulator" \
            "system-images;android-33;google_apis;x86_64"

      - name: Enable KVM (x86_64 only)
        if: matrix.abi == 'x86_64'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Test (x86_64 emulator only)
        if: matrix.abi == 'x86_64'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          force-avd-creation: true
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -euo pipefail
            TEST_BIN="$(find build -type f -name calculator_tests | head -n 1)"
            if [ -z "$TEST_BIN" ]; then
              echo "calculator_tests binary not found"
              exit 1
            fi
            adb push "$TEST_BIN" /data/local/tmp/calculator_tests
            adb shell chmod +x /data/local/tmp/calculator_tests
            adb shell /data/local/tmp/calculator_tests
