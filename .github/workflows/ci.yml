name: ci.android

on: [push, pull_request, workflow_dispatch]

jobs:

  android:

    strategy:
      fail-fast: false
      matrix:
        include:
          - { abi: armeabi-v7a, run-tests: false }
          - { abi: arm64-v8a,   run-tests: false }
          - { abi: x86,         run-tests: false }
          - { abi: x86_64,      run-tests: true  }

    name: ${{ matrix.abi }}
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Configure
        run: |
          cmake -B build -G "Ninja Multi-Config" \
            --toolchain "$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21

      - name: Build
        run: cmake --build build --config Release

      - name: Enable KVM
        if: matrix.run-tests == true
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Tests
        if: matrix.run-tests == true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 21
          target: google_apis
          arch: ${{ matrix.abi }}
          script: |
            set -euo pipefail
            TEST_BIN="$(find build -type f -name calculator_tests | head -n 1)"
            if [ -z "$TEST_BIN" ]; then
              echo "calculator_tests binary not found"
              exit 1
            fi
            adb push "$TEST_BIN" /data/local/tmp/calculator_tests
            adb shell chmod +x /data/local/tmp/calculator_tests
            adb shell /data/local/tmp/calculator_tests
